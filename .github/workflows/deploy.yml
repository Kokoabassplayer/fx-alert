name: Build & Deploy to Firebase Hosting

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - run: npm ci
    - run: npm run build

    # Deploy to Production (when pushing to master)
    - if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: ${{ secrets.GITHUB_TOKEN }}
        firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RATEREFRESHER }}
        channelId: live
        projectId: raterefresher

    # Deploy to Preview (when opening a PR)
    - if: github.event_name == 'pull_request'
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: ${{ secrets.GITHUB_TOKEN }}
        firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RATEREFRESHER }}
        channelId: preview
        expires: 7d
        projectId: raterefresher
